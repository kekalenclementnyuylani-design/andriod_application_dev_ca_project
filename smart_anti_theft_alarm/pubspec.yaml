name: smart_anti_theft_alarm
description: A smart motion-based anti-theft alarm app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sensors_plus: ^4.0.2
  audioplayers: ^5.2.1
  vibration: ^1.8.4
  torch_light: ^1.0.0
  flutter_foreground_task: ^6.1.3
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/alarm.mp3
